<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=393, initial-scale=1" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:393px; height:852px; }
  .screen {
    position:relative; width:393px; height:852px; overflow:hidden;
    background:#1d1e21;               /* premium charcoal (canonical --background token), not black */
    padding-left:24px; padding-right:24px;
    font-family:'Space Grotesk', system-ui, sans-serif;
  }
  .robot {
    position:absolute; width:340px; top:60px; right:-104px; z-index:1;
    filter: drop-shadow(0 22px 42px rgba(0,0,0,0.42));
    pointer-events:none; user-select:none;
  }
  .ph { position:absolute; top:46px; right:18px; z-index:5; font-family:'DM Sans',sans-serif;
        font-size:10px; letter-spacing:.04em; color:#6a6a6c; background:#000a; padding:3px 7px; border-radius:6px; }
  .text { position:relative; z-index:2; padding-top:296px; }
  .headline { color:#fff; font-weight:700; font-size:62px; line-height:1.02; letter-spacing:-0.045em; }
  .headline > span { display:block; }
  .dot { color:#FF6A2C; }
  .sub { margin-top:26px; font-size:27px; font-weight:700; letter-spacing:-0.02em; color:#fff; display:flex; align-items:baseline; gap:9px; }
  .sol { font-weight:700; background:linear-gradient(to right,#00B5A5,#E8B84A); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .lower { position:absolute; left:24px; right:24px; bottom:46px; z-index:3; }
  .signin { text-align:center; margin-bottom:26px; font-family:'DM Sans',sans-serif; font-size:17px; font-weight:500; color:#B8B4B2; }
  .signin a { color:#FF6A2C; font-weight:700; text-decoration:none; }
  .cta {
    width:100%; height:66px; border:none; border-radius:999px; background:#00B5A5; color:#161616;
    font-family:'Space Grotesk',sans-serif; font-size:21px; font-weight:700; letter-spacing:-0.02em;
    display:flex; align-items:center; justify-content:center; gap:14px;
  }
  .stripe { position:absolute; bottom:0; left:0; right:0; height:4px;
            background:linear-gradient(90deg,#FF6A2C 0%,#E8B84A 50%,#00B5A5 100%); }
</style>
</head>
<body>
  <div class="screen">
    <img class="robot" src="robot.png" alt="" />
    <div class="ph">robot = SVG placeholder · your PNG swaps in</div>
    <div class="text">
      <div class="headline">
        <span>Box it<span class="dot">.</span></span>
        <span>Rule it<span class="dot">.</span></span>
        <span>Run it<span class="dot">.</span></span>
      </div>
      <div class="sub"><span>Your</span><span class="sol">SOL</span></div>
    </div>
    <div class="lower">
      <div class="signin">Already have an account? <a href="#">Sign in</a></div>
      <button class="cta">Get started&nbsp;&nbsp;&#8594;</button>
    </div>
    <div class="stripe"></div>
  </div>
</body>
</html>
