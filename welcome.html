<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, viewport-fit=cover" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Space+Grotesk:wght@500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#0b0b0b; }
  .stage { min-height:100dvh; display:flex; align-items:center; justify-content:center; }
  .frame {
    position:relative; width:390px; height:700px; border-radius:40px; overflow:hidden;
    background:#1A1A1A;                         /* flat charcoal — no glows, no gradients */
    font-family:'Space Grotesk', system-ui, sans-serif;
  }
  .robot {
    position:absolute; width:340px; top:-20px; right:-80px; z-index:1;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));
    pointer-events:none; user-select:none;
    animation: float 5s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(12deg)} 50%{transform:translateY(-8px) rotate(12deg)} }
  .h1 {
    position:absolute; left:32px; top:300px; z-index:2;
    font-family:'Plus Jakarta Sans', sans-serif; font-weight:800;
    font-size:64px; line-height:1.05; letter-spacing:-0.04em; color:#fff;
  }
  .line { display:block; white-space:nowrap; }
  .odot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#FF6A2C; margin-left:6px; vertical-align:-2px; }
  .rotline {
    position:absolute; left:32px; top:530px; z-index:2;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:28px; letter-spacing:-0.01em;
    color:#fff; display:flex; align-items:baseline; gap:10px;
  }
  .reel { display:inline-block; height:1.2em; overflow:hidden; position:relative; top:0.18em; }
  .reel ul { list-style:none; margin:0; padding:0; animation: roll 6s steps(1,end) infinite; }
  .reel li { height:1.2em; line-height:1.2em; font-weight:700;
             background:linear-gradient(90deg,#00B5A5 0%,#E8B84A 100%);
             -webkit-background-clip:text; background-clip:text; color:transparent; }
  @keyframes roll {
    0%,18%   { transform:translateY(0); }
    25%,43%  { transform:translateY(-1.2em); }
    50%,68%  { transform:translateY(-2.4em); }
    75%,93%  { transform:translateY(-3.6em); }
    100%     { transform:translateY(-4.8em); }
  }
  .footer {
    position:absolute; left:24px; right:24px; bottom:30px; z-index:3; text-align:center;
    font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:500; color:rgba(255,255,255,0.6);
  }
  .footer a { color:#FF6A2C; font-weight:700; text-decoration:none; }
  @media (prefers-reduced-motion: reduce){ .robot{animation:none;transform:rotate(12deg)} .reel ul{animation:none} }
</style>
</head>
<body>
  <div class="stage">
    <div class="frame">
      <img class="robot" src="robot.png" alt="" />
      <div class="h1">
        <span class="line">Box it<i class="odot"></i></span>
        <span class="line">Rule it<i class="odot"></i></span>
        <span class="line">Run it<i class="odot"></i></span>
      </div>
      <div class="rotline">
        <span>Your</span>
        <span class="reel"><ul>
          <li>USDC</li><li>SOL</li><li>yield</li><li>stake</li><li>USDC</li>
        </ul></span>
      </div>
      <div class="footer">Already have an account? <a href="#">Sign in</a></div>
    </div>
  </div>
</body>
</html>
